
name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # This fix handles missing permissions on mobile-created files
      - name: Fix Permissions
        run: chmod +x gradlew || echo "No gradlew found yet"

      - name: Build with Gradle
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            echo "Error: gradlew not found. You need to run 'gradle wrapper' in Termux."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OMNI-Debug
          path: "**/*.apk"
